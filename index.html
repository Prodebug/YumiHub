<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YumiHub - Личный хаб</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 700px;
            padding: 40px 20px;
        }
        
        .logo {
            font-size: 4.5rem;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #00d4ff, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0 40px 0;
        }
        
        .feature-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }
        
        .feature-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .feature-item .icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .feature-item .label {
            font-size: 0.85rem;
            color: #aaa;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(90deg, #00d4ff, #7b68ee);
            color: white;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            margin: 10px 0;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            border: none;
            cursor: pointer;
        }
        
        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        
        .download-btn:active {
            transform: translateY(0px);
        }
        
        .version {
            margin-top: 25px;
            color: #888;
            font-size: 0.95rem;
        }
        
        .version strong {
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }
        
        .update-info {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #00d4ff, #7b68ee);
            margin: 20px auto;
            border-radius: 10px;
        }
        
        footer {
            margin-top: 60px;
            color: #555;
            font-size: 0.85rem;
        }
        
        footer a {
            color: #7b68ee;
            text-decoration: none;
        }
        
        footer a:hover {
            color: #00d4ff;
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .features {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .download-btn {
                padding: 15px 30px;
                font-size: 1.1rem;
            }
            
            .logo {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <div class="logo">🚀</div>
        
        <!-- Заголовок -->
        <h1>YumiHub</h1>
        <p class="subtitle">Твой личный центр управления</p>
        
        <div class="divider"></div>
        
        <!-- Особенности -->
        <div class="features">
            <div class="feature-item">
                <div class="icon">✅</div>
                <div class="label">Задачи</div>
            </div>
            <div class="feature-item">
                <div class="icon">📝</div>
                <div class="label">Заметки</div>
            </div>
            <div class="feature-item">
                <div class="icon">💰</div>
                <div class="label">Финансы</div>
            </div>
            <div class="feature-item">
                <div class="icon">🚀</div>
                <div class="label">Программы</div>
            </div>
            <div class="feature-item">
                <div class="icon">⚙️</div>
                <div class="label">Настройки</div>
            </div>
            <div class="feature-item">
                <div class="icon">🔄</div>
                <div class="label">Автообновление</div>
            </div>
        </div>
        
        <!-- Кнопка скачивания -->
        <a href="https://Prodebug.github.io/YumiHub/YumiHub.exe" class="download-btn" download>
            ⬇ Скачать YumiHub.exe
        </a>
        
        <!-- Версия -->
        <div class="version">
            Текущая версия: <strong id="current-version">1.0.0</strong>
        </div>
        <div class="update-info">
            💡 Автообновление включено в программе
        </div>
        
        <!-- Подвал -->
        <footer>
            © 2026 YumiHub • Сделано с ❤️<br>
            <a href="https://github.com/Prodebug/YumiHub" target="_blank">GitHub</a>
        </footer>
    </div>
</body>
</html>
